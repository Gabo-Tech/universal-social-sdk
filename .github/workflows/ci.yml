name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Build + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

  integration:
    name: Integration Tests (secret-gated)
    runs-on: ubuntu-latest
    needs: unit
    env:
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
      X_TEST_TWEET_ID: ${{ secrets.X_TEST_TWEET_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
      YOUTUBE_ACCESS_TOKEN: ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
      YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
      PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
      BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
      BLUESKY_TEST_ACTOR: ${{ secrets.BLUESKY_TEST_ACTOR }}
      MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
      MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
      MASTODON_ACCOUNT_ID: ${{ secrets.MASTODON_ACCOUNT_ID }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
    steps:
      - name: Check integration secret availability
        id: gate
        run: |
          missing=()
          for key in \
            X_API_KEY X_API_SECRET X_ACCESS_TOKEN X_ACCESS_SECRET X_TEST_TWEET_ID \
            FB_PAGE_ACCESS_TOKEN FB_PAGE_ID \
            IG_ACCESS_TOKEN IG_USER_ID \
            LINKEDIN_ACCESS_TOKEN LINKEDIN_ORG_URN \
            YOUTUBE_ACCESS_TOKEN YOUTUBE_CHANNEL_ID \
            TIKTOK_ACCESS_TOKEN \
            PINTEREST_ACCESS_TOKEN PINTEREST_BOARD_ID \
            BLUESKY_IDENTIFIER BLUESKY_APP_PASSWORD \
            MASTODON_BASE_URL MASTODON_ACCESS_TOKEN MASTODON_ACCOUNT_ID \
            THREADS_ACCESS_TOKEN THREADS_USER_ID
          do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping integration tests. Missing secrets: ${missing[*]}"
          else
            echo "can_run=true" >> "$GITHUB_OUTPUT"
            echo "All required integration secrets are present."
          fi

      - name: Checkout
        if: ${{ steps.gate.outputs.can_run == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.gate.outputs.can_run == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate.outputs.can_run == 'true' }}
        run: npm ci

      - name: Run integration tests
        if: ${{ steps.gate.outputs.can_run == 'true' }}
        run: npm run test:integration
