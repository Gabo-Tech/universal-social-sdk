name: Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish package to npm"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      EVENT_NAME: ${{ github.event_name }}
      INPUT_PUBLISH: ${{ github.event.inputs.publish }}
      GITHUB_REF: ${{ github.ref }}
    steps:
      - name: Check publish eligibility
        id: gate
        run: |
          should_publish=false

          if [ "$EVENT_NAME" = "push" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            should_publish=true
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_PUBLISH" = "true" ]; then
            should_publish=true
          fi

          if [ "$should_publish" != "true" ]; then
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "Manual run requested without publish=true. Skipping."
            exit 0
          fi

          if [ -z "$NPM_TOKEN" ]; then
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN is missing. Skipping publish."
            exit 0
          fi

          echo "can_publish=true" >> "$GITHUB_OUTPUT"
          echo "Publish conditions satisfied."

      - name: Checkout
        if: ${{ steps.gate.outputs.can_publish == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.gate.outputs.can_publish == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: ${{ steps.gate.outputs.can_publish == 'true' }}
        run: npm ci

      - name: Build package
        if: ${{ steps.gate.outputs.can_publish == 'true' }}
        run: npm run build

      - name: Run unit tests
        if: ${{ steps.gate.outputs.can_publish == 'true' }}
        run: npm run test:unit

      - name: Publish to npm
        if: ${{ steps.gate.outputs.can_publish == 'true' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
